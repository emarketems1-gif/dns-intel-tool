<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Intel Pro | 20M+ Auto-Save Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/tldts@6.1.47/dist/index.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card-bg: #161b22; --border: #30363d; --primary: #238636; --accent: #58a6ff; --text: #c9d1d9; --success: #3fb950; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-item span { display: block; font-size: 0.75rem; color: #8b949e; text-transform: uppercase; }
        .stat-item b { display: block; font-size: 1.5rem; color: var(--accent); margin-top: 5px; }
        .upload-section { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; margin-bottom: 20px; }
        input[type="file"] { display: none; }
        .custom-file-upload { background: #1f6feb; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: inline-block; }
        button { border: none; padding: 14px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; font-size: 1rem; }
        #startBtn { background: var(--primary); color: white; margin-bottom: 10px; }
        #startBtn:disabled { background: var(--border); color: #484f58; cursor: not-allowed; }
        .terminal { background: #000; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 12px; color: var(--success); height: 150px; overflow-y: auto; border: 1px solid var(--border); }
        progress { width: 100%; height: 8px; accent-color: var(--success); margin: 15px 0; }
        .badge { background: #f85149; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin:0 0 10px 0;"><i class="fas fa-bolt"></i> DNS Hyper-Processor <span class="badge">AUTO-SAVE ENABLED</span></h2>
        <p style="color: #8b949e; margin-bottom: 20px;">System will auto-download results every 1,000,000 domains to prevent crashes.</p>
        
        <div class="upload-section">
            <label for="fileInput" class="custom-file-upload">Upload Massive List</label>
            <input type="file" id="fileInput">
            <p id="fileName" style="margin-top:10px; font-size:0.9rem;">No file selected</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><span>Total Domains</span><b id="total">0</b></div>
            <div class="stat-item"><span>Processed</span><b id="count">0</b></div>
            <div class="stat-item"><span>Speed</span><b id="speed">0/s</b></div>
            <div class="stat-item"><span>Chunks Saved</span><b id="chunks">0</b></div>
        </div>

        <progress id="progressBar" value="0" max="100"></progress>
        <button id="startBtn">START 20M+ ENGINE</button>
    </div>

    <div class="terminal" id="log">SYSTEM READY. AUTO-SAVE ACTIVE AT 1M INTERVALS.</div>
</div>

<script>
    const { getDomain } = window.tldts;
    let sheet1 = ["domain,TXT_Record"];
    let sheet2 = ["domain,TYPE,extracted_root_domain"];
    
    let startTime;
    let totalProcessed = 0;
    let chunkCount = 0;
    const SAVE_INTERVAL = 1000000; // AUTO-SAVE EVERY 1 MILLION

    const fileInput = document.getElementById('fileInput');
    const startBtn = document.getElementById('startBtn');
    const logEl = document.getElementById('log');

    fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('fileName').innerText = fileInput.files[0].name; };

    startBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return;

        const text = await file.text();
        const domains = text.split(/\r?\n/).map(d => d.trim()).filter(d => d);
        
        document.getElementById('total').innerText = domains.length.toLocaleString();
        addLog(`> Engine Started. Target: ${domains.length} domains.`);
        
        startTime = Date.now();
        startBtn.disabled = true;

        await processInChunks(domains, 300);
    };

    async function processInChunks(domains, batchSize) {
        for (let i = 0; i < domains.length; i += batchSize) {
            const batch = domains.slice(i, i + batchSize);
            await Promise.all(batch.map((d, idx) => fetchDNS(d, idx % 2 === 0 ? 'cloudflare' : 'google')));
            
            totalProcessed += batch.length;
            updateUI(domains.length);

            // AUTO-SAVE LOGIC
            if (totalProcessed % SAVE_INTERVAL === 0 || totalProcessed === domains.length) {
                triggerAutoSave();
            }
        }
        addLog("✨ PROCESS FULLY COMPLETE.");
    }

    async function fetchDNS(domain, provider) {
        const url = provider === 'cloudflare' 
            ? `https://cloudflare-dns.com/dns-query?name=${domain}&type=TXT`
            : `https://dns.google/resolve?name=${domain}&type=TXT`;

        try {
            const res = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
            const data = await res.json();
            if (data.Answer) {
                data.Answer.forEach(ans => {
                    if (ans.type === 16) { 
                        const record = ans.data.replace(/"/g, '').trim();
                        sheet1.push(`"${domain}","${record}"`);
                        if (record.includes("v=spf1")) parseIntelligence(domain, record);
                    }
                });
            }
        } catch (e) {}
    }

    function parseIntelligence(domain, record) {
        const parts = record.split(/\s+/);
        let aSet = new Set(), mxSet = new Set();
        parts.forEach(part => {
            if (part.startsWith('a:')) {
                let target = part.split(':')[1];
                let root = getDomain(target);
                if (root) aSet.add(root.toLowerCase());
            }
            if (part.startsWith('mx:')) {
                let target = part.split(':')[1];
                let root = getDomain(target);
                if (root) mxSet.add(root.toLowerCase());
            }
        });
        aSet.forEach(root => sheet2.push(`"${domain}","A","${root}"`));
        mxSet.forEach(root => sheet2.push(`"${domain}","MX","${root}"`));
    }

    function triggerAutoSave() {
        chunkCount++;
        addLog(`> [AUTO-SAVE] Saving Chunk #${chunkCount} at ${totalProcessed} domains...`);
        
        download(sheet1, `TXT_Master_Part_${chunkCount}.csv`);
        download(sheet2, `SPF_Intel_Part_${chunkCount}.csv`);
        
        // RESET MEMORY TO PREVENT CRASH
        sheet1 = ["domain,TXT_Record"];
        sheet2 = ["domain,TYPE,extracted_root_domain"];
        
        document.getElementById('chunks').innerText = chunkCount;
    }

    function updateUI(total) {
        const speed = Math.round(totalProcessed / ((Date.now() - startTime) / 1000));
        document.getElementById('progressBar').value = (totalProcessed / total) * 100;
        document.getElementById('count').innerText = totalProcessed.toLocaleString();
        document.getElementById('speed').innerText = speed + "/s";
    }

    function addLog(msg) {
        logEl.innerHTML += `<div>${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function download(data, filename) {
        const blob = new Blob([data.join('\n')], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
