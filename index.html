<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Intel Pro | Hyper-Drive Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/tldts@6.1.47/dist/index.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; --success: #238636; --text: #c9d1d9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 300px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-box b { display: block; font-size: 1.4rem; color: var(--accent); }
        .stat-box span { font-size: 0.7rem; text-transform: uppercase; color: #8b949e; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #8b949e; }
        input, select { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        #startBtn { background: var(--success); color: white; }
        #startBtn:hover { background: #2ea043; }
        #startBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        .main-view { display: flex; flex-direction: column; gap: 20px; }
        progress { width: 100%; height: 10px; border-radius: 5px; accent-color: var(--success); }
        .terminal { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 11px; height: 300px; overflow-y: auto; color: #3fb950; }
        .active-row { border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel">
        <h3 style="margin-top:0"><i class="fas fa-sliders-h"></i> Settings</h3>
        <div class="control-group">
            <label>Concurrent Workers (Speed)</label>
            <input type="number" id="workerInp" value="500" min="10" max="2000">
        </div>
        <div class="control-group">
            <label>Auto-Save Interval (Domains)</label>
            <input type="number" id="saveInp" value="1000000" step="100000">
        </div>
        <div class="control-group">
            <label>DNS Strategy</label>
            <select id="dnsStrategy">
                <option value="balanced">Balanced (Google + CF)</option>
                <option value="cloudflare">Cloudflare Only</option>
                <option value="google">Google Only</option>
            </select>
        </div>
        <div class="control-group">
            <label>Upload File</label>
            <input type="file" id="fileInput">
        </div>
        <button id="startBtn"><i class="fas fa-rocket"></i> BOOSTER START</button>
        <button onclick="location.reload()" style="background:transparent; border:1px solid var(--border); color: #8b949e; font-size: 0.8rem;">Reset Engine</button>
    </div>

    <div class="main-view">
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0">Live Performance Dashboard</h2>
                <div id="statusBadge" style="background:#f85149; padding:4px 10px; border-radius:20px; font-size:0.7rem;">ENGINE IDLE</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box"><span>Processed</span><b id="count">0</b></div>
                <div class="stat-box"><span>Live Speed</span><b id="speed">0/s</b></div>
                <div class="stat-box"><span>Chunks Saved</span><b id="chunks">0</b></div>
                <div class="stat-box"><span>Errors</span><b id="errors" style="color:#f85149">0</b></div>
            </div>

            <progress id="progressBar" value="0" max="100"></progress>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#8b949e;">
                <span id="perc">0%</span>
                <span id="totalDisplay">Total: 0</span>
            </div>
        </div>

        <div class="terminal" id="log">SYSTEM READY. AWAITING INSTRUCTIONS...</div>
    </div>
</div>

<script>
    const { getDomain } = window.tldts;
    let sheet1 = ["domain,TXT_Record"];
    let sheet2 = ["domain,TYPE,extracted_root_domain"];
    
    let totalDomains = [];
    let currentIndex = 0;
    let processedCount = 0;
    let errorCount = 0;
    let chunkCount = 0;
    let startTime;
    let isRunning = false;

    const logEl = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');

    startBtn.onclick = async () => {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Upload file first!");

        const text = await file.text();
        totalDomains = text.split(/\r?\n/).map(d => d.trim()).filter(d => d);
        
        document.getElementById('totalDisplay').innerText = `Total: ${totalDomains.length.toLocaleString()}`;
        document.getElementById('statusBadge').innerText = "ENGINE RUNNING";
        document.getElementById('statusBadge').style.background = "#238636";
        
        startTime = Date.now();
        isRunning = true;
        startBtn.disabled = true;
        
        launchWorkers();
    };

    async function launchWorkers() {
        const workerCount = parseInt(document.getElementById('workerInp').value);
        addLog(`> Launching ${workerCount} independent workers...`);
        
        // Spawn independent workers
        for (let i = 0; i < workerCount; i++) {
            runWorker();
        }

        // Speed/Stats Monitor
        const monitor = setInterval(() => {
            if (!isRunning) return clearInterval(monitor);
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = Math.round(processedCount / elapsed);
            document.getElementById('speed').innerText = speed + "/s";
            document.getElementById('count').innerText = processedCount.toLocaleString();
            document.getElementById('errors').innerText = errorCount;
            document.getElementById('progressBar').value = (processedCount / totalDomains.length) * 100;
            document.getElementById('perc').innerText = Math.round((processedCount / totalDomains.length) * 100) + "%";

            // Auto-Save check
            const saveInterval = parseInt(document.getElementById('saveInp').value);
            if (processedCount > 0 && processedCount % saveInterval < workerCount && processedCount % saveInterval !== 0) {
                 // Triggered within a small window to catch the interval
            }
        }, 1000);
    }

    async function runWorker() {
        while (currentIndex < totalDomains.length && isRunning) {
            const domain = totalDomains[currentIndex++];
            const provider = getProvider();
            
            try {
                await fetchDNS(domain, provider);
            } catch (e) {
                errorCount++;
            }
            
            processedCount++;

            // Auto-save trigger
            const saveInterval = parseInt(document.getElementById('saveInp').value);
            if (processedCount % saveInterval === 0) {
                triggerAutoSave();
            }
        }
        
        if (processedCount >= totalDomains.length) {
            isRunning = false;
            addLog("✨ ALL DOMAINS FINISHED.");
            triggerAutoSave();
        }
    }

    function getProvider() {
        const strat = document.getElementById('dnsStrategy').value;
        if (strat === 'cloudflare') return 'cloudflare';
        if (strat === 'google') return 'google';
        return Math.random() > 0.5 ? 'cloudflare' : 'google';
    }

    async function fetchDNS(domain, provider) {
        const url = provider === 'cloudflare' 
            ? `https://cloudflare-dns.com/dns-query?name=${domain}&type=TXT`
            : `https://dns.google/resolve?name=${domain}&type=TXT`;

        const res = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
        const data = await res.json();
        if (data.Answer) {
            data.Answer.forEach(ans => {
                if (ans.type === 16) { 
                    const record = ans.data.replace(/"/g, '').trim();
                    sheet1.push(`"${domain}","${record}"`);
                    if (record.includes("v=spf1")) parseIntelligence(domain, record);
                }
            });
        }
    }

    function parseIntelligence(domain, record) {
        const parts = record.split(/\s+/);
        let aSet = new Set(), mxSet = new Set();
        parts.forEach(part => {
            if (part.startsWith('a:')) {
                let target = part.split(':')[1];
                let root = getDomain(target);
                if (root) aSet.add(root.toLowerCase());
            }
            if (part.startsWith('mx:')) {
                let target = part.split(':')[1];
                let root = getDomain(target);
                if (root) mxSet.add(root.toLowerCase());
            }
        });
        aSet.forEach(root => sheet2.push(`"${domain}","A","${root}"`));
        mxSet.forEach(root => sheet2.push(`"${domain}","MX","${root}"`));
    }

    function triggerAutoSave() {
        chunkCount++;
        addLog(`> [AUTO-SAVE] Exporting Chunk #${chunkCount}...`);
        download(sheet1, `Part_${chunkCount}_TXT_Master.csv`);
        download(sheet2, `Part_${chunkCount}_SPF_Intel.csv`);
        sheet1 = ["domain,TXT_Record"];
        sheet2 = ["domain,TYPE,extracted_root_domain"];
        document.getElementById('chunks').innerText = chunkCount;
    }

    function download(data, filename) {
        if(data.length <= 1) return;
        const blob = new Blob([data.join('\n')], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    }

    function addLog(msg) {
        logEl.innerHTML += `<div>${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }
</script>
</body>
</html>
