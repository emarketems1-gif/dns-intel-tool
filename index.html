<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed DNS Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/tldts@6.1.47/dist/index.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; line-height: 1.6; background: #0e1217; color: #fff; }
        .card { background: #1c2128; padding: 30px; border-radius: 12px; border: 1px solid #30363d; }
        .progress-box { margin-top: 20px; display: none; }
        progress { width: 100%; height: 20px; border-radius: 10px; }
        #log { font-family: monospace; font-size: 12px; background: #000; color: #00ff00; padding: 15px; height: 150px; overflow-y: scroll; margin-top: 10px; border-radius: 4px; }
        button { background: #238636; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
        .download-zone { margin-top: 20px; display: flex; gap: 10px; }
        .dl-btn { background: #1f6feb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Ultra-Fast DNS Intelligence</h2>
        <p>Optimized for 1M+ domains. Processes batches in parallel via Cloudflare DNS.</p>
        
        <input type="file" id="fileInput" accept=".txt,.csv">
        <button id="startBtn">Launch Engine</button>

        <div class="progress-box" id="progressBox">
            <p>Processed: <b id="count">0</b> / <b id="total">0</b> domains</p>
            <progress id="progressBar" value="0" max="100"></progress>
            <div id="log">Engine initialized...</div>
            
            <div class="download-zone">
                <button id="dlSheet1" class="dl-btn" style="display: none;">Download Sheet 1 (All TXT)</button>
                <button id="dlSheet2" class="dl-btn" style="display: none;">Download Sheet 2 (Extracted Only)</button>
            </div>
        </div>
    </div>

    <script>
        const { getDomain } = window.tldts;
        let sheet1 = ["domain,TXT_Record"];
        let sheet2 = ["domain,TYPE,extracted_root_domain"];
        
        const startBtn = document.getElementById('startBtn');
        const dl1 = document.getElementById('dlSheet1');
        const dl2 = document.getElementById('dlSheet2');

        startBtn.onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Select a file!");

            const text = await file.text();
            const domains = text.split(/\r?\n/).map(d => d.trim()).filter(d => d);
            
            document.getElementById('total').innerText = domains.length;
            document.getElementById('progressBox').style.display = 'block';
            startBtn.disabled = true;

            // PERFORMANCE BOOST: Increased batch size to 300
            await processInBatches(domains, 300);
        };

        async function processInBatches(domains, batchSize) {
            for (let i = 0; i < domains.length; i += batchSize) {
                const batch = domains.slice(i, i + batchSize);
                // Run all items in the batch simultaneously
                await Promise.all(batch.map(d => fetchDNS(d)));
                
                const progress = ((i + batch.length) / domains.length) * 100;
                document.getElementById('progressBar').value = progress;
                document.getElementById('count').innerText = i + batch.length;
            }
            addLog("✨ Job Finished!");
            dl1.style.display = 'block';
            dl2.style.display = 'block';
        };

        async function fetchDNS(domain) {
            try {
                const response = await fetch(`https://cloudflare-dns.com/dns-query?name=${domain}&type=TXT`, {
                    headers: { 'Accept': 'application/dns-json' }
                });
                const data = await response.json();
                
                if (data.Answer) {
                    data.Answer.forEach(ans => {
                        if (ans.type === 16) { 
                            const record = ans.data.replace(/"/g, '').trim();
                            
                            // SHEET 1: All TXT records for this domain
                            sheet1.push(`"${domain}","${record}"`);
                            
                            // SHEET 2: Targeted Intelligence
                            if (record.includes("v=spf1")) {
                                parseIntelligence(domain, record);
                            }
                        }
                    });
                }
            } catch (e) { /* Skip errors for speed */ }
        }

        function parseIntelligence(domain, record) {
            const parts = record.split(/\s+/);
            let aSet = new Set();
            let mxSet = new Set();

            parts.forEach(part => {
                if (part.startsWith('a:')) {
                    let target = part.split(':')[1];
                    let root = getDomain(target);
                    if (root) aSet.add(root.toLowerCase());
                }
                if (part.startsWith('mx:')) {
                    let target = part.split(':')[1];
                    let root = getDomain(target);
                    if (root) mxSet.add(root.toLowerCase());
                }
            });

            aSet.forEach(root => sheet2.push(`"${domain}","A","${root}"`));
            mxSet.forEach(root => sheet2.push(`"${domain}","MX","${root}"`));
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerText += "\n" + msg;
            log.scrollTop = log.scrollHeight;
        }

        // DOWNLOAD LOGIC
        function download(data, filename) {
            const blob = new Blob([data.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        dl1.onclick = () => download(sheet1, `sheet1_all_txt_${Date.now()}.csv`);
        dl2.onclick = () => download(sheet2, `sheet2_extracted_${Date.now()}.csv`);
    </script>
</body>
</html>
